name: Build Android

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  companion:
    name: Build Companion APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build Companion APK
        working-directory: apps/android
        run: |
          chmod +x gradlew 2>/dev/null || gradle wrapper
          ./gradlew assembleRelease

      - name: Upload Companion APK
        uses: actions/upload-artifact@v4
        with:
          name: android-companion-apk
          path: apps/android/app/build/outputs/apk/release/*.apk

  server:
    name: Build Server APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Download Node.js for Android
        run: bash scripts/download-node-android.sh

      - name: Build Server APK
        working-directory: apps/android-server
        run: |
          chmod +x gradlew 2>/dev/null || gradle wrapper
          ./gradlew assembleRelease

      - name: Upload Server APK
        uses: actions/upload-artifact@v4
        with:
          name: android-server-apk
          path: apps/android-server/app/build/outputs/apk/release/*.apk
