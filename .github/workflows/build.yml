name: Build Installer

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            node-arch: darwin-arm64
          - platform: macos-latest
            target: x86_64-apple-darwin
            node-arch: darwin-x64
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            node-arch: linux-x64
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            node-arch: win-x64

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install pnpm
        run: npm install -g pnpm@9

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2"

      - name: Install Linux deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libssl-dev

      - name: Download Node.js archive
        shell: bash
        run: bash scripts/download-node.sh

      - name: Download NSSM (Windows only)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $nssm_url = "https://nssm.cc/release/nssm-2.24.zip"
          Invoke-WebRequest -Uri $nssm_url -OutFile nssm.zip
          Expand-Archive nssm.zip -DestinationPath nssm-tmp
          Copy-Item "nssm-tmp/nssm-2.24/win64/nssm.exe" "apps/installer/src-tauri/resources/nssm.exe"

      - name: Install frontend deps
        working-directory: apps/installer
        run: pnpm install

      - name: Build Tauri app
        working-directory: apps/installer
        run: cargo tauri build --target ${{ matrix.target }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: installer-${{ matrix.target }}
          path: |
            apps/installer/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.dmg
            apps/installer/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.exe
            apps/installer/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.msi
            apps/installer/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.AppImage
            apps/installer/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.deb

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
